<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>手洗い洗車 予約</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #b8912e;
      --accent-dark: #8b6b20;
      --accent-light:#fdf6e3;
      --base:        #1a1a1a;
      --muted:       #888;
      --bg:          #f7f5f0;
      --border:      #e0dbd0;
      --surface:     #ffffff;
      --success:     #2d7d4e;
      --radius:      12px;
      --radius-pill: 9999px;
      --trans:       0.2s ease;
      --font:        'Noto Sans JP', -apple-system, sans-serif;
    }

    html, body {
      height: 100%; height: 100dvh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--base);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ===== 1画面レイアウト ===== */
    .page {
      height: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      gap: 0;
    }

    .tag {
      font-size: 11px; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(24px, 6vw, 40px);
      font-weight: 700; letter-spacing: 0.02em;
      line-height: 1.3; text-align: center;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 13px; color: var(--muted);
      text-align: center; line-height: 1.8;
      margin-bottom: 40px;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 15px 36px;
      background: var(--accent); border: none; border-radius: var(--radius-pill);
      color: white; font-family: var(--font); font-size: 15px; font-weight: 700;
      letter-spacing: 0.04em; cursor: pointer;
      transition: all var(--trans);
      box-shadow: 0 4px 20px rgba(184,145,46,0.3);
    }
    .btn-primary:hover  { background: var(--accent-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .footer-note {
      position: fixed; bottom: 20px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: #bbb;
      letter-spacing: 0.05em;
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal-box {
      background: var(--surface); border-radius: 20px;
      padding: 24px 20px 20px; width: 100%; max-width: 420px;
      max-height: 92dvh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transform: translateY(12px);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--muted); transition: background var(--trans);
    }
    .modal-close:hover { background: var(--border); }

    /* Month nav */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border-radius: 8px;
      padding: 8px 12px; margin-bottom: 12px;
    }
    .month-nav-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--muted); transition: all var(--trans);
    }
    .month-nav-btn:hover:not(:disabled) { color: var(--accent); }
    .month-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .month-nav-label { font-size: 14px; font-weight: 700; }

    /* Calendar grid */
    .modal-cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
      margin-bottom: 12px;
    }
    .modal-cal-dow {
      text-align: center; font-size: 11px; font-weight: 700;
      color: var(--muted); padding: 6px 0;
    }
    .modal-cal-dow.sun { color: #c0392b; }
    .modal-cal-dow.sat { color: #2980b9; }
    .modal-cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1px;
      border-radius: 6px; font-size: 13px; font-weight: 500;
    }
    .modal-cal-day .day-mark { font-size: 10px; }
    .modal-cal-day.sun:not(.past):not(.empty) { color: #e74c3c; }
    .modal-cal-day.sat:not(.past):not(.empty) { color: #3498db; }
    .modal-cal-day.past  { color: #ccc; }
    .modal-cal-day.full  { color: #c0392b; background: #fef0ee; }
    .modal-cal-day.full .day-mark  { color: #c0392b; }
    .modal-cal-day.few   { background: var(--accent-light); }
    .modal-cal-day.few .day-num   { color: var(--accent-dark); }
    .modal-cal-day.few .day-mark  { color: var(--accent); }
    .modal-cal-day.available { background: #edf7f1; }
    .modal-cal-day.available .day-num  { color: #1e6b40; }
    .modal-cal-day.available .day-mark { color: var(--success); }
    .modal-cal-day.today { outline: 2px solid var(--accent); outline-offset: -1px; }

    /* Skeleton */
    .cal-skeleton-row {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 2px;
    }
    .cal-skeleton-cell {
      aspect-ratio: 1; border-radius: 6px;
      background: linear-gradient(90deg,#ededeb 25%,#e2e2e0 50%,#ededeb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Legend */
    .cal-legend {
      display: flex; gap: 12px; justify-content: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .legend-dot.available { background: #edf7f1; border: 1px solid #a5d6b8; }
    .legend-dot.few       { background: var(--accent-light); border: 1px solid #e0c070; }
    .legend-dot.full      { background: #fef0ee; border: 1px solid #e8a090; }

    /* Reserve btn */
    .modal-reserve-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: var(--radius-pill);
      color: white; font-family: var(--font); font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: all var(--trans);
    }
    .modal-reserve-btn:hover { background: var(--accent-dark); }

    /* Error */
    .cal-error {
      padding: 20px; text-align: center; color: #c0392b; font-size: 13px;
      background: #fef9f9; border: 1px solid #f0c8c8; border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .cal-error-retry {
      display: inline-block; margin-top: 8px; padding: 5px 12px;
      background: none; border: 1px solid #c0392b; border-radius: var(--radius-pill);
      color: #c0392b; font-family: var(--font); font-size: 12px; cursor: pointer;
    }
  </style>
</head>
<body>

<main class="page">
  <div class="tag">Hand Wash &amp; Detailing</div>
  <h1>手洗い洗車<br>ご予約</h1>
  <p class="sub">空き状況を確認してそのまま予約できます</p>
  <button class="btn-primary" onclick="openModal()">
    &#x1F4C5;&ensp;空き状況を確認
  </button>
</main>

<p class="footer-note">&copy; 2025 Premium Car Wash</p>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modal" onclick="onOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">空き状況</div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>

    <div class="month-nav">
      <button class="month-nav-btn" id="month-prev" onclick="changeMonth(-1)">&#x2039;</button>
      <div class="month-nav-label" id="month-label"></div>
      <button class="month-nav-btn" id="month-next" onclick="changeMonth(1)">&#x203A;</button>
    </div>

    <div id="modal-cal-area"></div>

    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot available"></div>空きあり</div>
      <div class="legend-item"><div class="legend-dot few"></div>残りわずか</div>
      <div class="legend-item"><div class="legend-dot full"></div>満席</div>
    </div>

    <a href="./index.html" class="modal-reserve-btn">予約に進む &nbsp;&#x2192;</a>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwK6HcVgMsoooDQa1ZhL5NvI9hCmAbGYdoVpEBKe2G6cDDmW0eZHUULs8JT15b0mBG8/exec';
const DOW_NAMES = ['日','月','火','水','木','金','土'];

const calState = { year: null, month: null, cache: {} };

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (!calState.year) {
    const now = new Date();
    calState.year  = now.getFullYear();
    calState.month = now.getMonth();
  }
  renderModalCalendar(calState.year, calState.month);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function changeMonth(delta) {
  let m = calState.month + delta;
  let y = calState.year;
  if (m < 0)  { m = 11; y--; }
  if (m > 11) { m = 0;  y++; }
  const now = new Date();
  if (y < now.getFullYear() || (y === now.getFullYear() && m < now.getMonth())) return;
  const maxDate = new Date(now.getFullYear(), now.getMonth() + 3, 1);
  if (new Date(y, m, 1) >= maxDate) return;
  calState.year = y; calState.month = m;
  renderModalCalendar(y, m);
}

function renderModalCalendar(year, month) {
  document.getElementById('month-label').textContent = `${year}年${month + 1}月`;
  const now = new Date();
  document.getElementById('month-prev').disabled =
    year < now.getFullYear() || (year === now.getFullYear() && month <= now.getMonth());
  const ny = month === 11 ? year + 1 : year, nm = month === 11 ? 0 : month + 1;
  document.getElementById('month-next').disabled =
    new Date(ny, nm, 1) >= new Date(now.getFullYear(), now.getMonth() + 3, 1);

  const key = `${year}-${String(month + 1).padStart(2,'0')}`;
  if (calState.cache[key]) { buildCalendarGrid(year, month, calState.cache[key].days); return; }
  showCalSkeleton();
  fetchMonthData(year, month);
}

function showCalSkeleton() {
  const area = document.getElementById('modal-cal-area');
  let html = '<div class="modal-cal-grid">';
  DOW_NAMES.forEach(() => { html += '<div class="modal-cal-dow"></div>'; });
  html += '</div>';
  for (let r = 0; r < 5; r++) {
    html += '<div class="cal-skeleton-row">';
    for (let c = 0; c < 7; c++) html += '<div class="cal-skeleton-cell"></div>';
    html += '</div>';
  }
  area.innerHTML = html;
}

async function fetchMonthData(year, month) {
  const monthStr = `${year}-${String(month + 1).padStart(2,'0')}`;
  try {
    const res  = await fetch(`${GAS_URL}?month=${monthStr}&duration=1`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    calState.cache[monthStr] = { days: data.days };
    buildCalendarGrid(year, month, data.days);
  } catch (err) {
    showCalError(() => fetchMonthData(year, month));
  }
}

function buildCalendarGrid(year, month, days) {
  const area      = document.getElementById('modal-cal-area');
  const todayStr  = getTodayStr();
  const firstDow  = new Date(year, month, 1).getDay();
  const daysInMon = new Date(year, month + 1, 0).getDate();

  let html = '<div class="modal-cal-grid">';
  DOW_NAMES.forEach((d, i) => {
    html += `<div class="modal-cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`;
  });
  for (let i = 0; i < firstDow; i++) html += '<div class="modal-cal-day empty"></div>';
  for (let d = 1; d <= daysInMon; d++) {
    const mm = String(month+1).padStart(2,'0'), dd = String(d).padStart(2,'0');
    const dateStr = `${year}-${mm}-${dd}`;
    const dow = new Date(year, month, d).getDay();
    const status = days[dateStr] || 'past';
    let cls = `modal-cal-day ${status}`;
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (dateStr === todayStr) cls += ' today';
    const mark = status==='available'?'○':status==='few'?'△':status==='full'?'✕':'';
    html += `<div class="${cls}"><span class="day-num">${d}</span>${mark?`<span class="day-mark">${mark}</span>`:''}` + `</div>`;
  }
  html += '</div>';
  area.innerHTML = html;
}

function showCalError(retryFn) {
  document.getElementById('modal-cal-area').innerHTML = `
    <div class="cal-error">空き状況の取得に失敗しました
      <br><button class="cal-error-retry" onclick="(${retryFn.toString()})()">再試行</button>
    </div>`;
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
</script>
</body>
</html>
