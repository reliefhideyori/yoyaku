<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空き状況カレンダー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #b8912e;
      --accent-dark:  #8b6b20;
      --accent-light: #fdf6e3;
      --base:         #1a1a1a;
      --muted:        #888;
      --bg:           #f7f5f0;
      --border:       #e0dbd0;
      --surface:      #ffffff;
      --success:      #2d7d4e;
      --radius:       12px;
      --radius-pill:  9999px;
      --trans:        0.2s ease;
      --font:         'Noto Sans JP', -apple-system, sans-serif;
    }

    html, body {
      font-family: var(--font);
      background: var(--surface);
      color: var(--base);
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      padding: 20px;
      max-width: 420px;
      margin: 0 auto;
    }

    /* Month nav */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border-radius: 8px;
      padding: 8px 12px; margin-bottom: 12px;
    }
    .month-nav-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--muted); transition: all var(--trans);
      display: flex; align-items: center; justify-content: center;
    }
    .month-nav-btn:hover:not(:disabled) { color: var(--accent); }
    .month-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .month-nav-label { font-size: 15px; font-weight: 700; }

    /* Calendar grid */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
      margin-bottom: 12px;
    }
    .cal-dow {
      text-align: center; font-size: 12px; font-weight: 700;
      color: var(--muted); padding: 6px 0;
    }
    .cal-dow.sun { color: #c0392b; }
    .cal-dow.sat { color: #2980b9; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      border-radius: 7px; font-size: 13px; font-weight: 500;
    }
    .cal-day .day-mark { font-size: 10px; line-height: 1; }
    .cal-day.sun:not(.past):not(.empty) { color: #e74c3c; }
    .cal-day.sat:not(.past):not(.empty) { color: #3498db; }
    .cal-day.past  { color: #ccc; }
    .cal-day.full  { color: #c0392b; background: #fef0ee; }
    .cal-day.full .day-mark  { color: #c0392b; }
    .cal-day.few   { background: var(--accent-light); }
    .cal-day.few .day-num  { color: var(--accent-dark); }
    .cal-day.few .day-mark { color: var(--accent); }
    .cal-day.available { background: #edf7f1; }
    .cal-day.available .day-num  { color: #1e6b40; }
    .cal-day.available .day-mark { color: var(--success); }
    .cal-day.today { outline: 2px solid var(--accent); outline-offset: -1px; }

    /* Skeleton */
    .skeleton-row {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px;
    }
    .skeleton-cell {
      aspect-ratio: 1; border-radius: 7px;
      background: linear-gradient(90deg, #ededeb 25%, #e2e2e0 50%, #ededeb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Legend */
    .legend {
      display: flex; gap: 14px; justify-content: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .legend-dot.available { background: #edf7f1; border: 1px solid #a5d6b8; }
    .legend-dot.few       { background: var(--accent-light); border: 1px solid #e0c070; }
    .legend-dot.full      { background: #fef0ee; border: 1px solid #e8a090; }

    /* Reserve button */
    .reserve-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: var(--radius-pill);
      color: white; font-family: var(--font); font-size: 14px; font-weight: 700;
      letter-spacing: 0.04em; cursor: pointer; text-decoration: none;
      transition: all var(--trans);
    }
    .reserve-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .reserve-btn:active { transform: scale(0.97); }

    /* Error */
    .cal-error {
      padding: 20px; text-align: center; color: #c0392b; font-size: 13px;
      background: #fef9f9; border: 1px solid #f0c8c8; border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .cal-error-retry {
      display: inline-block; margin-top: 8px; padding: 5px 12px;
      background: none; border: 1px solid #c0392b; border-radius: var(--radius-pill);
      color: #c0392b; font-family: var(--font); font-size: 12px; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="widget">

  <div class="month-nav">
    <button class="month-nav-btn" id="month-prev" onclick="changeMonth(-1)">&#x2039;</button>
    <div class="month-nav-label" id="month-label"></div>
    <button class="month-nav-btn" id="month-next" onclick="changeMonth(1)">&#x203A;</button>
  </div>

  <div id="cal-area"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot available"></div>空きあり</div>
    <div class="legend-item"><div class="legend-dot few"></div>残りわずか</div>
    <div class="legend-item"><div class="legend-dot full"></div>満席</div>
  </div>

  <a href="./index.html" class="reserve-btn" target="_top">
    予約に進む &nbsp;&#x2192;
  </a>

</div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbwK6HcVgMsoooDQa1ZhL5NvI9hCmAbGYdoVpEBKe2G6cDDmW0eZHUULs8JT15b0mBG8/exec';
const DOW_NAMES = ['日','月','火','水','木','金','土'];
const state     = { year: null, month: null, cache: {} };

(function init() {
  const now    = new Date();
  state.year   = now.getFullYear();
  state.month  = now.getMonth();
  render(state.year, state.month);
})();

function changeMonth(delta) {
  let m = state.month + delta, y = state.year;
  if (m < 0)  { m = 11; y--; }
  if (m > 11) { m = 0;  y++; }
  const now = new Date();
  if (y < now.getFullYear() || (y === now.getFullYear() && m < now.getMonth())) return;
  if (new Date(y, m, 1) >= new Date(now.getFullYear(), now.getMonth() + 3, 1)) return;
  state.year = y; state.month = m;
  render(y, m);
}

function render(year, month) {
  document.getElementById('month-label').textContent = `${year}年${month + 1}月`;
  const now = new Date();
  document.getElementById('month-prev').disabled =
    year < now.getFullYear() || (year === now.getFullYear() && month <= now.getMonth());
  const ny = month === 11 ? year + 1 : year, nm = month === 11 ? 0 : month + 1;
  document.getElementById('month-next').disabled =
    new Date(ny, nm, 1) >= new Date(now.getFullYear(), now.getMonth() + 3, 1);

  const key = `${year}-${String(month + 1).padStart(2,'0')}`;
  if (state.cache[key]) { buildGrid(year, month, state.cache[key]); return; }
  showSkeleton();
  fetchData(year, month);
}

function showSkeleton() {
  const area = document.getElementById('cal-area');
  let html = '<div class="cal-grid">';
  DOW_NAMES.forEach(() => { html += '<div class="cal-dow"></div>'; });
  html += '</div>';
  for (let r = 0; r < 5; r++) {
    html += '<div class="skeleton-row">';
    for (let c = 0; c < 7; c++) html += '<div class="skeleton-cell"></div>';
    html += '</div>';
  }
  area.innerHTML = html;
}

async function fetchData(year, month) {
  const key = `${year}-${String(month + 1).padStart(2,'0')}`;
  try {
    const res  = await fetch(`${GAS_URL}?month=${key}&duration=1`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.cache[key] = data.days;
    buildGrid(year, month, data.days);
  } catch {
    document.getElementById('cal-area').innerHTML = `
      <div class="cal-error">空き状況の取得に失敗しました
        <br><button class="cal-error-retry" onclick="fetchData(${year},${month})">再試行</button>
      </div>`;
  }
}

function buildGrid(year, month, days) {
  const todayStr  = getTodayStr();
  const firstDow  = new Date(year, month, 1).getDay();
  const daysInMon = new Date(year, month + 1, 0).getDate();
  let html = '<div class="cal-grid">';
  DOW_NAMES.forEach((d, i) => {
    html += `<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`;
  });
  for (let i = 0; i < firstDow; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMon; d++) {
    const mm = String(month+1).padStart(2,'0'), dd = String(d).padStart(2,'0');
    const dateStr = `${year}-${mm}-${dd}`;
    const dow    = new Date(year, month, d).getDay();
    const status = days[dateStr] || 'past';
    let cls = `cal-day ${status}`;
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (dateStr === todayStr) cls += ' today';
    const mark = status==='available'?'○':status==='few'?'△':status==='full'?'✕':'';
    html += `<div class="${cls}"><span class="day-num">${d}</span>${mark?`<span class="day-mark">${mark}</span>`:''}</div>`;
  }
  html += '</div>';
  document.getElementById('cal-area').innerHTML = html;
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
</script>
</body>
</html>
